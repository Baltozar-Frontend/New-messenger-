<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>P2P Glolves Messenger</title>
    <style>
        body { margin: 0; background: #0e1621; color: white; font-family: sans-serif; height: 100dvh; display: flex; flex-direction: column; }
        #chat { flex: 1; overflow-y: auto; padding: 10px; }
        .msg { padding: 10px; margin: 5px; border-radius: 10px; background: #2b5278; max-width: 80%; }
        /* Исправленный стиль для кружков Glolves.glb */
        .video-msg { width: 150px; height: 150px; border-radius: 50%; overflow: hidden; }
        video { width: 100%; height: 100%; object-fit: cover; }
        .controls { padding: 20px; display: flex; gap: 10px; }
        input { flex: 1; padding: 10px; border-radius: 5px; border: none; }
        button { padding: 10px; border-radius: 5px; background: #5288c1; border: none; color: white; }
    </style>
</head>
<body>

<div id="chat"></div>
<div class="controls">
    <input id="peerId" placeholder="ID собеседника">
    <input id="msgInput" placeholder="Сообщение...">
    <button onclick="sendMessage()">➤</button>
    <button id="recBtn">📹 (Зажать)</button>
</div>

<script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
<script>
    // Инициализация P2P соединения
    const peer = new Peer(); 
    let conn;

    peer.on('open', (id) => alert("Твой ID: " + id + " (отправь его другу)"));

    peer.on('connection', (c) => {
        conn = c;
        setupConnection();
    });

    function connectToPeer() {
        conn = peer.connect(document.getElementById('peerId').value);
        setupConnection();
    }

    function setupConnection() {
        conn.on('data', (data) => {
            if (data.type === 'text') appendMsg(data.content);
            if (data.type === 'video') appendVideo(data.content);
        });
    }

    function sendMessage() {
        const text = document.getElementById('msgInput').value;
        conn.send({ type: 'text', content: text });
        appendMsg("Вы: " + text);
    }

    function appendMsg(txt) {
        document.getElementById('chat').innerHTML += `<div class="msg">${txt}</div>`;
    }

    // Запись видео
    let mediaRecorder;
    let chunks = [];
    const recBtn = document.getElementById('recBtn');

    recBtn.onmousedown = recBtn.ontouchstart = async () => {
        const stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
        mediaRecorder = new MediaRecorder(stream);
        mediaRecorder.ondataavailable = e => chunks.push(e.data);
        mediaRecorder.onstop = () => {
            const blob = new Blob(chunks, { type: 'video/webm' });
            const reader = new FileReader();
            reader.onload = () => conn.send({ type: 'video', content: reader.result });
            reader.readAsDataURL(blob);
            chunks = [];
        };
        mediaRecorder.start();
    };

    recBtn.onmouseup = recBtn.ontouchend = () => mediaRecorder.stop();

    function appendVideo(base64) {
        const div = document.createElement('div');
        div.className = 'msg video-msg';
        div.innerHTML = `<video src="${base64}" autoplay playsinline loop></video>`;
        document.getElementById('chat').appendChild(div);
    }
</script>
</body>
</html>
