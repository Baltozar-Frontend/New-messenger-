<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Telegram Light & Adaptive</title>
    <style>
        :root {
            --bg-main: #0e1621;
            --bg-sidebar: #17212b;
            --bg-chat: #0e1621;
            --bg-active-item: #2b394a;
            --bg-hover-item: #202b36;
            --bg-input: #24303f;
            --bg-msg-in: #182533;
            --bg-msg-out: #2b5278;
            --text-main: #f5f5f5;
            --text-muted: #7f91a4;
            --accent: #5288c1;
            --accent-hover: #649ad4;
            --border: #101924;
            --success: #46b06a;
            --danger: #e24a4a;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        body {
            background-color: var(--bg-main);
            color: var(--text-main);
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            display: flex;
        }

        .app-wrapper {
            display: flex;
            width: 100%;
            height: 100%;
            position: relative;
        }

        /* ==========================================================================
           АВТОРИЗАЦИЯ И КАПЧА
           ========================================================================== */
        .auth-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: var(--bg-main);
            z-index: 1000;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .auth-card {
            background-color: var(--bg-sidebar);
            padding: 30px;
            border-radius: 12px;
            width: 90%;
            max-width: 360px;
            text-align: center;
            border: 1px solid var(--border);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .auth-card h2 { margin-bottom: 8px; font-size: 1.4rem; }
        .auth-card p { color: var(--text-muted); font-size: 0.85rem; margin-bottom: 20px; }

        .auth-input {
            width: 100%;
            padding: 12px;
            background-color: var(--bg-input);
            border: 2px solid transparent;
            border-radius: 8px;
            color: var(--text-main);
            font-size: 1rem;
            outline: none;
            margin-bottom: 15px;
            text-align: center;
        }
        .auth-input:focus { border-color: var(--accent); }

        .captcha-box {
            background: rgba(0,0,0,0.2);
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 15px;
            border: 1px dashed var(--text-muted);
        }
        .captcha-question {
            font-weight: bold;
            font-size: 1.1rem;
            margin-bottom: 8px;
            color: var(--accent);
            letter-spacing: 1px;
        }

        .btn-submit {
            width: 100%;
            padding: 12px;
            background-color: var(--accent);
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }
        .btn-submit:hover { background-color: var(--accent-hover); }
        .btn-submit:disabled {
            background-color: var(--bg-input);
            color: var(--text-muted);
            cursor: not-allowed;
        }

        /* ==========================================================================
           САЙДБАР (СПИСОК ЧАТОВ)
           ========================================================================== */
        .sidebar {
            width: 320px;
            height: 100%;
            background-color: var(--bg-sidebar);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
            transition: transform 0.3s ease;
        }

        .sidebar-header { padding: 15px; border-bottom: 1px solid var(--border); }
        .my-info h3 { font-size: 1rem; font-weight: 600; margin-bottom: 8px; color: var(--accent); }
        
        .search-input {
            width: 100%;
            padding: 10px 12px;
            background-color: var(--bg-input);
            border: none;
            border-radius: 8px;
            color: var(--text-main);
            outline: none;
            font-size: 0.9rem;
        }

        .list-scrollable { flex: 1; overflow-y: auto; }
        .section-title { padding: 12px 15px 6px; font-size: 0.75rem; text-transform: uppercase; color: var(--accent); font-weight: bold; }

        .chat-item {
            display: flex;
            align-items: center;
            padding: 12px 15px;
            cursor: pointer;
            border-bottom: 1px solid rgba(0,0,0,0.05);
        }
        .chat-item:hover { background-color: var(--bg-hover-item); }
        .chat-item.active { background-color: var(--bg-active-item); }

        .item-avatar {
            width: 40px; height: 40px; border-radius: 50%;
            margin-right: 12px; display: flex; justify-content: center;
            align-items: center; font-weight: bold; color: #fff; flex-shrink: 0;
        }
        .item-content { flex: 1; min-width: 0; }
        .item-meta { display: flex; justify-content: space-between; margin-bottom: 2px; }
        .item-name { font-weight: 600; font-size: 0.9rem; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .item-time { font-size: 0.75rem; color: var(--text-muted); }
        .item-bottom { display: flex; justify-content: space-between; align-items: center; }
        .item-preview { font-size: 0.8rem; color: var(--text-muted); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .item-preview.typing { color: var(--success); }
        .badge-unread { background-color: var(--accent); color: #fff; font-size: 0.7rem; font-weight: bold; padding: 2px 6px; border-radius: 10px; }

        /* ==========================================================================
           ОКНО ЧАТА
           ========================================================================== */
        .chat-main {
            flex: 1;
            display: flex;
            flex-direction: column;
            background-color: var(--bg-chat);
            position: relative;
        }

        .placeholder-view {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: var(--bg-main);
            display: flex; justify-content: center; align-items: center; z-index: 5;
        }
        .placeholder-view p { background: rgba(0,0,0,0.3); padding: 8px 16px; border-radius: 20px; font-size: 0.85rem; color: var(--text-muted); }

        .chat-header {
            height: 55px;
            background-color: var(--bg-sidebar);
            border-bottom: 1px solid var(--border);
            display: flex; align-items: center; padding: 0 15px; gap: 10px;
        }

        .back-btn {
            display: none;
            background: none; border: none; color: var(--accent);
            font-size: 1.4rem; cursor: pointer; padding: 4px 8px; margin-right: 5px;
        }

        .active-user-info h4 { font-size: 0.9rem; font-weight: 600; }
        .active-user-info p { font-size: 0.75rem; color: var(--text-muted); }

        .messages-viewport { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 8px; }
        
        .msg-bubble {
            max-width: 75%; padding: 8px 12px; border-radius: 10px; font-size: 0.9rem;
            line-height: 1.35; position: relative; word-wrap: break-word;
            box-shadow: 0 1px 1px rgba(0,0,0,0.15);
        }
        .msg-bubble.inbound { background-color: var(--bg-msg-in); align-self: flex-start; }
        .msg-bubble.outbound { background-color: var(--bg-msg-out); align-self: flex-end; }
        
        .msg-timestamp { font-size: 0.65rem; color: var(--text-muted); margin-top: 4px; margin-left: 8px; float: right; }
        .msg-bubble.outbound .msg-timestamp { color: var(--text-out-time); }

        .chat-input-panel {
            background-color: var(--bg-sidebar); padding: 10px 15px;
            display: flex; align-items: center; gap: 10px; border-top: 1px solid var(--border);
        }
        .message-input-node {
            flex: 1; padding: 10px 12px; background-color: var(--bg-input);
            border: none; border-radius: 8px; color: var(--text-main); outline: none; font-size: 0.9rem;
        }
        .action-send-btn { background: none; border: none; color: var(--accent); font-weight: bold; font-size: 0.9rem; cursor: pointer; }

        /* ==========================================================================
           АДАПТИВНОСТЬ ДЛЯ СМАРТФОНОВ (Экраны < 768px)
           ========================================================================== */
        @media (max-width: 767px) {
            .sidebar {
                width: 100%;
                position: absolute;
                left: 0; top: 0; bottom: 0;
                z-index: 10;
            }
            .chat-main {
                width: 100%;
                position: absolute;
                left: 0; top: 0; bottom: 0;
                z-index: 5;
            }
            /* Когда чат открыт, сдвигаем сайдбар влево, скрывая его */
            .app-wrapper.chat-opened .sidebar {
                transform: translateX(-100%);
            }
            .app-wrapper.chat-opened .back-btn {
                display: block;
            }
            .placeholder-view {
                display: none !important; /* На мобилке заглушка не нужна */
            }
            .messages-viewport { padding: 10px; }
            .msg-bubble { max-width: 85%; }
        }

        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 4px; }
    </style>
</head>
<body>

    <div class="app-wrapper" id="appWrapper">

        <!-- ОКНО АВТОРИЗАЦИИ С КАПЧЕЙ -->
        <div class="auth-overlay" id="authScreen">
            <div class="auth-card">
                <h2>Регистрация</h2>
                <p>Введите юзернейм и решите капчу.</p>
                
                <input type="text" id="usernameInput" class="auth-input" placeholder="username" maxlength="15" autocomplete="off">
                
                <div class="captcha-box">
                    <div class="captcha-question" id="captchaQuestion">2 + 2 = ?</div>
                    <input type="number" id="captchaInput" class="auth-input" style="margin-bottom:0;" placeholder="Ответ">
                </div>

                <button class="btn-submit" id="authSubmitBtn" disabled>Войти</button>
            </div>
        </div>

        <!-- СПИСОК ЧАТОВ -->
        <div class="sidebar">
            <div class="sidebar-header">
                <div class="my-info">
                    <h3 id="myNameNode">@username</h3>
                </div>
                <input type="text" id="globalSearchInput" class="search-input" placeholder="Поиск людей по @username...">
            </div>
            <div class="list-scrollable" id="sidebarListContent"></div>
        </div>

        <!-- ОКНО ЧАТА -->
        <div class="chat-main">
            <div class="placeholder-view" id="emptyChatPlaceholder">
                <p>Выберите чат или воспользуйтесь поиском</p>
            </div>

            <div class="chat-header">
                <button class="back-btn" id="backToSidebarBtn">←</button>
                <div class="item-avatar" id="activeChatAvatar" style="width:34px; height:34px; font-size:0.85rem;">?</div>
                <div class="active-user-info">
                    <h4 id="activeChatTitle">Чат не выбран</h4>
                    <p id="activeChatStatus"></p>
                </div>
            </div>

            <div class="messages-viewport" id="messagesContainer"></div>

            <div class="chat-input-panel">
                <input type="text" id="mainMessageInput" class="message-input-node" placeholder="Напишите сообщение..." autocomplete="off">
                <button id="sendMessageBtn" class="action-send-btn">ОТПРАВИТЬ</button>
            </div>
        </div>

    </div>

    <script>
        class LocalNetworkCore {
            constructor() {
                this.storageKeyUsers = 'tg_sim_users';
                this.storageKeyPayload = 'tg_sim_packet';
                this.packetCallback = null;
                if(!localStorage.getItem(this.storageKeyUsers)) {
                    localStorage.setItem(this.storageKeyUsers, JSON.stringify(['durov', 'bot_support']));
                }
            }

            registerUserOnNode(username) {
                let currentUsers = JSON.parse(localStorage.getItem(this.storageKeyUsers));
                username = username.trim().toLowerCase();
                if(!currentUsers.includes(username)) {
                    currentUsers.push(username);
                    localStorage.setItem(this.storageKeyUsers, JSON.stringify(currentUsers));
                }
                return username;
            }

            searchUsersOnNode(query) {
                let allUsers = JSON.parse(localStorage.getItem(this.storageKeyUsers));
                query = query.trim().toLowerCase();
                if(!query) return [];
                return allUsers.filter(user => user.includes(query));
            }

            broadcastPacket(packet) {
                const fullPacket = { id: Math.random().toString(36).substring(2), timestamp: Date.now(), ...packet };
                localStorage.setItem(this.storageKeyPayload, JSON.stringify(fullPacket));
                if(this.packetCallback) {
                    setTimeout(() => this.packetCallback(fullPacket), 10);
                }
            }

            listenPackets(callback) {
                this.packetCallback = callback;
                window.addEventListener('storage', (event) => {
                    if (event.key === this.storageKeyPayload && event.newValue) {
                        try { this.packetCallback(JSON.parse(event.newValue)); } catch (e) {}
                    }
                });
            }
        }

        class DatabaseManager {
            constructor(currentUsername) {
                this.myKey = `tg_history_${currentUsername}`;
            }
            getHistory() {
                let data = localStorage.getItem(this.myKey);
                return data ? JSON.parse(data) : {};
            }
            saveMessage(chatWith, messageObj) {
                let history = this.getHistory();
                if(!history[chatWith]) history[chatWith] = [];
                history[chatWith].push(messageObj);
                localStorage.setItem(this.myKey, JSON.stringify(history));
            }
        }

        const VisualGenerator = {
            colors: ['#4a90e2', '#e24a4a', '#46b06a', '#f5a623', '#7ac1eb', '#bd10e0'],
            getHashColor(str) {
                let hash = 0;
                for (let i = 0; i < str.length; i++) hash = str.charCodeAt(i) + ((hash << 5) - hash);
                return this.colors[Math.abs(hash) % this.colors.length];
            },
            generateAvatarMarkup(username) {
                return `<div class="item-avatar" style="background-color: ${this.getHashColor(username)}">${username.charAt(0).toUpperCase()}</div>`;
            }
        };

        class ApplicationEngine {
            constructor() {
                this.network = new LocalNetworkCore();
                this.db = null;
                this.currentUser = '';
                this.activeChatUser = null;
                this.sessionUnreadCounters = {};
                
                // Переменные для капчи
                this.captchaNum1 = 0;
                this.captchaNum2 = 0;
                this.captchaAnswer = 0;

                this.cacheDOM();
                this.bindEvents();
                this.initNetworkListeners();
                this.generateCaptcha();
                this.checkActiveSession();
            }

            cacheDOM() {
                this.dom = {
                    appWrapper: document.getElementById('appWrapper'),
                    authScreen: document.getElementById('authScreen'),
                    usernameInput: document.getElementById('usernameInput'),
                    captchaQuestion: document.getElementById('captchaQuestion'),
                    captchaInput: document.getElementById('captchaInput'),
                    authSubmitBtn: document.getElementById('authSubmitBtn'),
                    myNameNode: document.getElementById('myNameNode'),
                    globalSearchInput: document.getElementById('globalSearchInput'),
                    sidebarListContent: document.getElementById('sidebarListContent'),
                    emptyChatPlaceholder: document.getElementById('emptyChatPlaceholder'),
                    activeChatAvatar: document.getElementById('activeChatAvatar'),
                    activeChatTitle: document.getElementById('activeChatTitle'),
                    activeChatStatus: document.getElementById('activeChatStatus'),
                    messagesContainer: document.getElementById('messagesContainer'),
                    mainMessageInput: document.getElementById('mainMessageInput'),
                    sendMessageBtn: document.getElementById('sendMessageBtn'),
                    backToSidebarBtn: document.getElementById('backToSidebarBtn')
                };
            }

            bindEvents() {
                this.dom.authSubmitBtn.addEventListener('click', () => this.handleAuth());
                this.dom.usernameInput.addEventListener('input', () => this.validateCaptchaForm());
                this.dom.captchaInput.addEventListener('input', () => this.validateCaptchaForm());
                this.dom.sendMessageBtn.addEventListener('click', () => this.executeSendMessage());
                this.dom.mainMessageInput.addEventListener('keypress', (e) => { if(e.key === 'Enter') this.executeSendMessage(); });
                this.dom.globalSearchInput.addEventListener('input', (e) => this.renderSidebar(e.target.value));
                this.dom.backToSidebarBtn.addEventListener('click', () => this.closeChatMobile());
            }

            generateCaptcha() {
                this.captchaNum1 = Math.floor(Math.random() * 10) + 1;
                this.captchaNum2 = Math.floor(Math.random() * 10) + 1;
                this.captchaAnswer = this.captchaNum1 + this.captchaNum2;
                this.dom.captchaQuestion.innerText = `${this.captchaNum1} + ${this.captchaNum2} = ?`;
            }

            validateCaptchaForm() {
                const userLen = this.dom.usernameInput.value.trim().length;
                const captchaVal = parseInt(this.dom.captchaInput.value);
                
                if (userLen >= 3 && captchaVal === this.captchaAnswer) {
                    this.dom.authSubmitBtn.disabled = false;
                } else {
                    this.dom.authSubmitBtn.disabled = true;
                }
            }

            initNetworkListeners() {
                this.network.listenPackets((packet) => {
                    if (packet.sender === this.currentUser) return;
                    if (packet.type === 'msg' && packet.receiver === this.currentUser) {
                        this.handleInboundMessage(packet);
                    }
                });
            }

            checkActiveSession() {
                const savedUser = sessionStorage.getItem('tg_active_session_user');
                if (savedUser) {
                    this.setupUserSession(savedUser);
                    this.dom.authScreen.style.display = 'none';
                }
            }

            handleAuth() {
                const rawUser = this.dom.usernameInput.value.trim();
                const cleanUser = this.network.registerUserOnNode(rawUser);
                sessionStorage.setItem('tg_active_session_user', cleanUser);
                this.setupUserSession(cleanUser);
                this.dom.authScreen.style.display = 'none';
            }

            setupUserSession(username) {
                this.currentUser = username;
                this.db = new DatabaseManager(this.currentUser);
                this.dom.myNameNode.innerText = `@${this.currentUser}`;
                this.renderSidebar();
            }

            renderSidebar(filterQuery = '') {
                let html = '';
                const history = this.db.getHistory();
                const activeChats = Object.keys(history);
                const cleanQuery = filterQuery.replace('@', '').trim().toLowerCase();

                // Поиск новых людей
                if(cleanQuery) {
                    const searchResults = this.network.searchUsersOnNode(cleanQuery);
                    html += `<div class="section-title">Глобальный поиск</div>`;
                    const filtered = searchResults.filter(user => user !== this.currentUser);
                    
                    if(filtered.length === 0) {
                        html += `<div style="padding:15px; font-size:0.8rem; color:var(--text-muted)">Никого не найдено</div>`;
                    } else {
                        filtered.forEach(user => {
                            html += `
                                <div class="chat-item" onclick="window.appEngineInstance.selectChat('${user}')">
                                    ${VisualGenerator.generateAvatarMarkup(user)}
                                    <div class="item-content"><div class="item-name">@${user}</div><div class="item-preview">Нажмите, чтобы начать общение</div></div>
                                </div>`;
                        });
                    }
                }

                // Список активных контактов (при регистрации тут ЧИСТО)
                html += `<div class="section-title">Мои диалоги</div>`;
                const displayedChats = activeChats.filter(chatUser => !cleanQuery || chatUser.includes(cleanQuery));

                if(displayedChats.length === 0 && !cleanQuery) {
                    html += `<div style="padding:15px; font-size:0.8rem; color:var(--text-muted); text-align:center;">Здесь пока пусто.<br>Найдите собеседника через поиск выше!</div>`;
                } else {
                    displayedChats.forEach(chatUser => {
                        const messages = history[chatUser] || [];
                        const lastMsg = messages[messages.length - 1];
                        if(!lastMsg) return;
                        
                        const unreadCount = this.sessionUnreadCounters[chatUser] || 0;
                        const activeClass = (this.activeChatUser === chatUser) ? 'active' : '';

                        html += `
                            <div class="chat-item ${activeClass}" onclick="window.appEngineInstance.selectChat('${chatUser}')">
                                ${VisualGenerator.generateAvatarMarkup(chatUser)}
                                <div class="item-content">
                                    <div class="item-meta"><span class="item-name">@${chatUser}</span><span class="item-time">${lastMsg.time}</span></div>
                                    <div class="item-bottom">
                                        <span class="item-preview">${lastMsg.text}</span>
                                        ${unreadCount > 0 ? `<span class="badge-unread">${unreadCount}</span>` : ''}
                                    </div>
                                </div>
                            </div>`;
                    });
                }
                this.dom.sidebarListContent.innerHTML = html;
            }

            selectChat(username) {
                this.activeChatUser = username;
                this.sessionUnreadCounters[username] = 0;
                this.dom.emptyChatPlaceholder.style.display = 'none';

                this.dom.activeChatTitle.innerText = `@${username}`;
                this.dom.activeChatAvatar.innerText = username.charAt(0).toUpperCase();
                this.dom.activeChatAvatar.style.backgroundColor = VisualGenerator.getHashColor(username);
                this.dom.activeChatStatus.innerText = 'в сети';

                let history = this.db.getHistory();
                if (!history[username]) {
                    this.db.saveMessage(username, { type: 'sys', text: 'init', time: '' });
                }

                // Адаптивный триггер: разворачиваем чат на мобилках
                this.dom.appWrapper.classList.add('chat-opened');

                this.renderMessagesView();
                this.renderSidebar(this.dom.globalSearchInput.value);
                
                setTimeout(() => this.dom.mainMessageInput.focus(), 100);
            }

            closeChatMobile() {
                this.dom.appWrapper.classList.remove('chat-opened');
                this.activeChatUser = null;
                this.renderSidebar(this.dom.globalSearchInput.value);
            }

            renderMessagesView() {
                if(!this.activeChatUser) return;
                const history = this.db.getHistory();
                const messages = history[this.activeChatUser] || [];
                let html = '';
                
                messages.forEach(msg => {
                    if (msg.type === 'sys') return;
                    const dir = (msg.type === 'out') ? 'outbound' : 'inbound';
                    html += `<div class="msg-bubble ${dir}">${msg.text}<span class="msg-timestamp">${msg.time}</span></div>`;
                });

                this.dom.messagesContainer.innerHTML = html;
                this.dom.messagesContainer.scrollTop = this.dom.messagesContainer.scrollHeight;
            }

            executeSendMessage() {
                const text = this.dom.mainMessageInput.value.trim();
                if(!text || !this.activeChatUser) return;

                const timeStr = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                this.db.saveMessage(this.activeChatUser, { type: 'out', text: text, time: timeStr });

                this.network.broadcastPacket({
                    type: 'msg', sender: this.currentUser, receiver: this.activeChatUser, text: text, time: timeStr
                });

                this.dom.mainMessageInput.value = '';
                this.renderMessagesView();
                this.renderSidebar(this.dom.globalSearchInput.value);
            }

            handleInboundMessage(packet) {
                this.db.saveMessage(packet.sender, { type: 'in', text: packet.text, time: packet.time });
                if (this.activeChatUser === packet.sender) {
                    this.renderMessagesView();
                } else {
                    this.sessionUnreadCounters[packet.sender] = (this.sessionUnreadCounters[packet.sender] || 0) + 1;
                }
                this.renderSidebar(this.dom.globalSearchInput.value);
            }
        }

        window.appEngineInstance = new ApplicationEngine();
    </script>
</body>
</html>
