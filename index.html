<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Web Messenger (WebSocket + AES)</title>
    
    <!-- Подключаем библиотеку для шифрования (AES) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <!-- Подключаем библиотеку для моментальной связи (MQTT over WebSockets) -->
    <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>

    <style>
        :root {
            --bg-main: #0e1621;
            --bg-sidebar: #17212b;
            --bg-chat: #0e1621;
            --bg-active-item: #2b394a;
            --bg-hover-item: #202b36;
            --bg-input: #24303f;
            --bg-msg-in: #182533;
            --bg-msg-out: #2b5278;
            --text-main: #f5f5f5;
            --text-muted: #7f91a4;
            --accent: #5288c1;
            --accent-hover: #649ad4;
            --border: #101924;
            --success: #46b06a;
            --danger: #e24a4a;
            --warning: #f5a623;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        body { background-color: var(--bg-main); color: var(--text-main); height: 100vh; width: 100vw; overflow: hidden; display: flex; }
        .app-wrapper { display: flex; width: 100%; height: 100%; position: relative; }

        /* Авторизация */
        .auth-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: var(--bg-main); z-index: 1000; display: flex; justify-content: center; align-items: center; }
        .auth-card { background-color: var(--bg-sidebar); padding: 30px; border-radius: 12px; width: 90%; max-width: 360px; text-align: center; border: 1px solid var(--border); box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .auth-card h2 { margin-bottom: 8px; font-size: 1.4rem; }
        .auth-card p { color: var(--text-muted); font-size: 0.85rem; margin-bottom: 20px; }
        .auth-input { width: 100%; padding: 12px; background-color: var(--bg-input); border: 2px solid transparent; border-radius: 8px; color: var(--text-main); font-size: 1rem; outline: none; margin-bottom: 15px; text-align: center; }
        .auth-input:focus { border-color: var(--accent); }
        .captcha-box { background: rgba(0,0,0,0.2); padding: 12px; border-radius: 8px; margin-bottom: 15px; border: 1px dashed var(--text-muted); }
        .captcha-question { font-weight: bold; font-size: 1.1rem; margin-bottom: 8px; color: var(--accent); letter-spacing: 1px; }
        .btn-submit { width: 100%; padding: 12px; background-color: var(--accent); color: #fff; border: none; border-radius: 8px; font-size: 1rem; font-weight: 600; cursor: pointer; transition: background 0.2s; }
        .btn-submit:hover { background-color: var(--accent-hover); }
        .btn-submit:disabled { background-color: var(--bg-input); color: var(--text-muted); cursor: not-allowed; }

        /* Сайдбар */
        .sidebar { width: 320px; height: 100%; background-color: var(--bg-sidebar); border-right: 1px solid var(--border); display: flex; flex-direction: column; flex-shrink: 0; transition: transform 0.3s ease; }
        .sidebar-header { padding: 15px; border-bottom: 1px solid var(--border); }
        
        .profile-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        .my-info h3 { font-size: 1rem; font-weight: 600; color: var(--accent); }
        .network-status { display: flex; align-items: center; gap: 6px; font-size: 0.75rem; color: var(--text-muted); }
        .status-dot { width: 8px; height: 8px; border-radius: 50%; background-color: var(--danger); box-shadow: 0 0 5px currentColor; }
        .status-dot.online { background-color: var(--success); }
        .status-dot.connecting { background-color: var(--warning); animation: pulse 1s infinite alternate; }

        @keyframes pulse { from { opacity: 0.5; transform: scale(0.8); } to { opacity: 1; transform: scale(1.2); } }

        .search-input { width: 100%; padding: 10px 12px; background-color: var(--bg-input); border: none; border-radius: 8px; color: var(--text-main); outline: none; font-size: 0.9rem; }
        .list-scrollable { flex: 1; overflow-y: auto; }
        .section-title { padding: 12px 15px 6px; font-size: 0.75rem; text-transform: uppercase; color: var(--accent); font-weight: bold; }
        .chat-item { display: flex; align-items: center; padding: 12px 15px; cursor: pointer; border-bottom: 1px solid rgba(0,0,0,0.05); }
        .chat-item:hover { background-color: var(--bg-hover-item); }
        .chat-item.active { background-color: var(--bg-active-item); }
        .item-avatar { width: 40px; height: 40px; border-radius: 50%; margin-right: 12px; display: flex; justify-content: center; align-items: center; font-weight: bold; color: #fff; flex-shrink: 0; }
        .item-content { flex: 1; min-width: 0; }
        .item-meta { display: flex; justify-content: space-between; margin-bottom: 2px; }
        .item-name { font-weight: 600; font-size: 0.9rem; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .item-time { font-size: 0.75rem; color: var(--text-muted); }
        .item-bottom { display: flex; justify-content: space-between; align-items: center; }
        .item-preview { font-size: 0.8rem; color: var(--text-muted); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .badge-unread { background-color: var(--accent); color: #fff; font-size: 0.7rem; font-weight: bold; padding: 2px 6px; border-radius: 10px; }

        /* Окно чата */
        .chat-main { flex: 1; display: flex; flex-direction: column; background-color: var(--bg-chat); position: relative; }
        .placeholder-view { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background-color: var(--bg-main); display: flex; justify-content: center; align-items: center; z-index: 5; }
        .placeholder-view p { background: rgba(0,0,0,0.3); padding: 8px 16px; border-radius: 20px; font-size: 0.85rem; color: var(--text-muted); }
        .chat-header { height: 55px; background-color: var(--bg-sidebar); border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 0 15px; gap: 10px; }
        .back-btn { display: none; background: none; border: none; color: var(--accent); font-size: 1.4rem; cursor: pointer; padding: 4px 8px; margin-right: 5px; }
        .active-user-info h4 { font-size: 0.9rem; font-weight: 600; }
        .active-user-info p { font-size: 0.75rem; color: var(--success); }
        .messages-viewport { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 8px; }
        .msg-bubble { max-width: 75%; padding: 8px 12px; border-radius: 10px; font-size: 0.9rem; line-height: 1.35; position: relative; word-wrap: break-word; box-shadow: 0 1px 1px rgba(0,0,0,0.15); }
        .msg-bubble.inbound { background-color: var(--bg-msg-in); align-self: flex-start; border-bottom-left-radius: 2px; }
        .msg-bubble.outbound { background-color: var(--bg-msg-out); align-self: flex-end; border-bottom-right-radius: 2px; }
        .msg-timestamp { font-size: 0.65rem; color: var(--text-muted); margin-top: 4px; margin-left: 12px; float: right; }
        .msg-bubble.outbound .msg-timestamp { color: var(--text-out-time); }
        .chat-input-panel { background-color: var(--bg-sidebar); padding: 10px 15px; display: flex; align-items: center; gap: 10px; border-top: 1px solid var(--border); }
        .message-input-node { flex: 1; padding: 12px; background-color: var(--bg-input); border: none; border-radius: 8px; color: var(--text-main); outline: none; font-size: 0.95rem; }
        .action-send-btn { background: none; border: none; color: var(--accent); font-weight: bold; font-size: 0.95rem; cursor: pointer; padding: 10px; }

        /* Адаптивность */
        @media (max-width: 767px) {
            .sidebar { width: 100%; position: absolute; left: 0; top: 0; bottom: 0; z-index: 10; }
            .chat-main { width: 100%; position: absolute; left: 0; top: 0; bottom: 0; z-index: 5; }
            .app-wrapper.chat-opened .sidebar { transform: translateX(-100%); }
            .app-wrapper.chat-opened .back-btn { display: block; }
            .placeholder-view { display: none !important; }
            .msg-bubble { max-width: 85%; }
        }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 4px; }
    </style>
</head>
<body>

    <div class="app-wrapper" id="appWrapper">
        <div class="auth-overlay" id="authScreen">
            <div class="auth-card">
                <h2>Secure Login</h2>
                <p>Сообщения шифруются AES-256</p>
                <input type="text" id="usernameInput" class="auth-input" placeholder="Ваш @username" maxlength="15" autocomplete="off">
                <div class="captcha-box">
                    <div class="captcha-question" id="captchaQuestion">Загрузка...</div>
                    <input type="number" id="captchaInput" class="auth-input" style="margin-bottom:0;" placeholder="Ответ">
                </div>
                <button class="btn-submit" id="authSubmitBtn" disabled>Войти</button>
            </div>
        </div>

        <div class="sidebar">
            <div class="sidebar-header">
                <div class="profile-header">
                    <div class="my-info"><h3 id="myNameNode">@username</h3></div>
                    <div class="network-status">
                        <span id="statusText">Оффлайн</span>
                        <div class="status-dot" id="statusDot"></div>
                    </div>
                </div>
                <input type="text" id="globalSearchInput" class="search-input" placeholder="Новый чат (введите ник)...">
            </div>
            <div class="list-scrollable" id="sidebarListContent"></div>
        </div>

        <div class="chat-main">
            <div class="placeholder-view" id="emptyChatPlaceholder">
                <p>Выберите чат или введите ник в поиске</p>
            </div>
            <div class="chat-header">
                <button class="back-btn" id="backToSidebarBtn">←</button>
                <div class="item-avatar" id="activeChatAvatar" style="width:34px; height:34px; font-size:0.85rem;">?</div>
                <div class="active-user-info">
                    <h4 id="activeChatTitle">Чат не выбран</h4>
                    <p>Защищено end-to-end шифрованием</p>
                </div>
            </div>
            <div class="messages-viewport" id="messagesContainer"></div>
            <div class="chat-input-panel">
                <input type="text" id="mainMessageInput" class="message-input-node" placeholder="Напишите сообщение..." autocomplete="off">
                <button id="sendMessageBtn" class="action-send-btn">➤</button>
            </div>
        </div>
    </div>

    <script>
        /**
         * НАСТОЯЩИЙ СЕТЕВОЙ ДВИЖОК (WebSockets + CryptoJS Encryption)
         */
        class SecureNetworkCore {
            constructor(onMessageReceived, onStatusChange) {
                // Используем публичный брокер WebSockets. Он работает моментально.
                this.brokerUrl = 'wss://broker.emqx.io:8084/mqtt';
                // Общий топик для приложения. В реальном мире он был бы скрыт, но у нас шифрование.
                this.networkTopic = 'secure_p2p_chat_matrix_2026'; 
                // Ключ шифрования. Все пакеты уходят в сеть как нечитаемый мусор.
                this.secretKey = 'SuperSecretEncryptionKey_XYZ'; 
                
                this.client = null;
                this.onMessageReceived = onMessageReceived;
                this.onStatusChange = onStatusChange;
                this.isConnected = false;
            }

            connect(username) {
                this.currentUser = username;
                this.onStatusChange('connecting');
                
                // Инициализация WebSocket соединения
                this.client = mqtt.connect(this.brokerUrl, {
                    clientId: `user_${username}_${Math.random().toString(16).substring(2, 8)}`,
                    clean: true
                });

                this.client.on('connect', () => {
                    this.isConnected = true;
                    this.onStatusChange('online');
                    this.client.subscribe(this.networkTopic, { qos: 1 });
                });

                this.client.on('offline', () => {
                    this.isConnected = false;
                    this.onStatusChange('offline');
                });

                this.client.on('message', (topic, message) => {
                    this.handleRawNetworkMessage(message.toString());
                });
            }

            sendEncryptedPacket(receiver, text, time) {
                if (!this.isConnected) return false;

                const payload = {
                    s: this.currentUser, // sender
                    r: receiver,         // receiver
                    t: text,             // text
                    m: time              // time
                };

                // Шифруем пакет перед отправкой в интернет!
                const ciphertext = CryptoJS.AES.encrypt(JSON.stringify(payload), this.secretKey).toString();
                this.client.publish(this.networkTopic, ciphertext, { qos: 1 });
                return true;
            }

            handleRawNetworkMessage(ciphertext) {
                try {
                    // Расшифровываем входящий пакет
                    const bytes = CryptoJS.AES.decrypt(ciphertext, this.secretKey);
                    const decryptedStr = bytes.toString(CryptoJS.enc.Utf8);
                    
                    if (!decryptedStr) return; // Мусорный пакет
                    
                    const data = JSON.parse(decryptedStr);

                    // Если сообщение предназначено нам, передаем в UI
                    if (data.r === this.currentUser) {
                        this.onMessageReceived({ sender: data.s, text: data.t, time: data.m });
                    }
                } catch (e) {
                    // Игнорируем чужие или поврежденные пакеты
                }
            }
        }

        /* Локальная база данных (оставляем для сохранения истории) */
        class DatabaseManager {
            constructor(currentUsername) {
                this.myKey = `tg_secure_db_${currentUsername}`;
            }
            getHistory() {
                let data = localStorage.getItem(this.myKey);
                return data ? JSON.parse(data) : {};
            }
            saveMessage(chatWith, messageObj) {
                let history = this.getHistory();
                if(!history[chatWith]) history[chatWith] = [];
                history[chatWith].push(messageObj);
                localStorage.setItem(this.myKey, JSON.stringify(history));
            }
        }

        const VisualGenerator = {
            colors: ['#4a90e2', '#e24a4a', '#46b06a', '#f5a623', '#7ac1eb', '#bd10e0'],
            getHashColor(str) {
                let hash = 0;
                for (let i = 0; i < str.length; i++) hash = str.charCodeAt(i) + ((hash << 5) - hash);
                return this.colors[Math.abs(hash) % this.colors.length];
            },
            generateAvatarMarkup(username) {
                return `<div class="item-avatar" style="background-color: ${this.getHashColor(username)}">${username.charAt(0).toUpperCase()}</div>`;
            }
        };

        class ApplicationEngine {
            constructor() {
                this.db = null;
                this.currentUser = '';
                this.activeChatUser = null;
                this.sessionUnreadCounters = {};
                
                this.captchaAnswer = 0;

                this.cacheDOM();
                this.bindEvents();
                this.generateCaptcha();
                
                // Инициализируем сеть с коллбеками
                this.network = new SecureNetworkCore(
                    (packet) => this.handleInboundMessage(packet),
                    (status) => this.updateNetworkUI(status)
                );

                this.checkActiveSession();
            }

            cacheDOM() {
                this.dom = {
                    appWrapper: document.getElementById('appWrapper'),
                    authScreen: document.getElementById('authScreen'),
                    usernameInput: document.getElementById('usernameInput'),
                    captchaQuestion: document.getElementById('captchaQuestion'),
                    captchaInput: document.getElementById('captchaInput'),
                    authSubmitBtn: document.getElementById('authSubmitBtn'),
                    myNameNode: document.getElementById('myNameNode'),
                    statusText: document.getElementById('statusText'),
                    statusDot: document.getElementById('statusDot'),
                    globalSearchInput: document.getElementById('globalSearchInput'),
                    sidebarListContent: document.getElementById('sidebarListContent'),
                    emptyChatPlaceholder: document.getElementById('emptyChatPlaceholder'),
                    activeChatAvatar: document.getElementById('activeChatAvatar'),
                    activeChatTitle: document.getElementById('activeChatTitle'),
                    messagesContainer: document.getElementById('messagesContainer'),
                    mainMessageInput: document.getElementById('mainMessageInput'),
                    sendMessageBtn: document.getElementById('sendMessageBtn'),
                    backToSidebarBtn: document.getElementById('backToSidebarBtn')
                };
            }

            bindEvents() {
                this.dom.authSubmitBtn.addEventListener('click', () => this.handleAuth());
                this.dom.usernameInput.addEventListener('input', () => this.validateCaptchaForm());
                this.dom.captchaInput.addEventListener('input', () => this.validateCaptchaForm());
                
                const sendAction = () => this.executeSendMessage();
                this.dom.sendMessageBtn.addEventListener('click', sendAction);
                this.dom.mainMessageInput.addEventListener('keypress', (e) => { if(e.key === 'Enter') sendAction(); });
                
                this.dom.globalSearchInput.addEventListener('input', (e) => this.renderSidebar(e.target.value));
                this.dom.backToSidebarBtn.addEventListener('click', () => this.closeChatMobile());
            }

            generateCaptcha() {
                const n1 = Math.floor(Math.random() * 10) + 1;
                const n2 = Math.floor(Math.random() * 10) + 1;
                this.captchaAnswer = n1 + n2;
                this.dom.captchaQuestion.innerText = `${n1} + ${n2} = ?`;
            }

            validateCaptchaForm() {
                const userLen = this.dom.usernameInput.value.trim().length;
                const captchaVal = parseInt(this.dom.captchaInput.value);
                this.dom.authSubmitBtn.disabled = !(userLen >= 3 && captchaVal === this.captchaAnswer);
            }

            updateNetworkUI(status) {
                this.dom.statusDot.className = `status-dot ${status}`;
                if (status === 'online') this.dom.statusText.innerText = 'В сети';
                else if (status === 'connecting') this.dom.statusText.innerText = 'Соединение...';
                else this.dom.statusText.innerText = 'Оффлайн';
            }

            checkActiveSession() {
                const savedUser = sessionStorage.getItem('tg_secure_user');
                if (savedUser) {
                    this.setupUserSession(savedUser);
                    this.dom.authScreen.style.display = 'none';
                }
            }

            handleAuth() {
                const rawUser = this.dom.usernameInput.value.trim().toLowerCase();
                sessionStorage.setItem('tg_secure_user', rawUser);
                this.setupUserSession(rawUser);
                this.dom.authScreen.style.display = 'none';
            }

            setupUserSession(username) {
                this.currentUser = username;
                this.db = new DatabaseManager(this.currentUser);
                this.dom.myNameNode.innerText = `@${this.currentUser}`;
                this.renderSidebar();
                
                // Подключаемся к интернет-серверу!
                this.network.connect(this.currentUser);
            }

            renderSidebar(filterQuery = '') {
                let html = '';
                const history = this.db.getHistory();
                const activeChats = Object.keys(history);
                const cleanQuery = filterQuery.replace('@', '').trim().toLowerCase();

                if(cleanQuery) {
                    html += `<div class="section-title">Начать новый диалог</div>
                             <div class="chat-item" onclick="window.app.selectChat('${cleanQuery}')">
                                 ${VisualGenerator.generateAvatarMarkup(cleanQuery)}
                                 <div class="item-content"><div class="item-name">@${cleanQuery}</div><div class="item-preview">Нажмите, чтобы написать</div></div>
                             </div>`;
                }

                html += `<div class="section-title">Мои диалоги</div>`;
                const displayedChats = activeChats.filter(chatUser => !cleanQuery || chatUser.includes(cleanQuery));

                if(displayedChats.length === 0 && !cleanQuery) {
                    html += `<div style="padding:15px; font-size:0.8rem; color:var(--text-muted); text-align:center;">Введи ник друга в поиск сверху, чтобы начать.</div>`;
                } else {
                    displayedChats.forEach(chatUser => {
                        const messages = history[chatUser] || [];
                        const lastMsg = messages[messages.length - 1];
                        if(!lastMsg) return;
                        
                        const unreadCount = this.sessionUnreadCounters[chatUser] || 0;
                        const activeClass = (this.activeChatUser === chatUser) ? 'active' : '';

                        html += `
                            <div class="chat-item ${activeClass}" onclick="window.app.selectChat('${chatUser}')">
                                ${VisualGenerator.generateAvatarMarkup(chatUser)}
                                <div class="item-content">
                                    <div class="item-meta"><span class="item-name">@${chatUser}</span><span class="item-time">${lastMsg.time}</span></div>
                                    <div class="item-bottom">
                                        <span class="item-preview">${lastMsg.text}</span>
                                        ${unreadCount > 0 ? `<span class="badge-unread">${unreadCount}</span>` : ''}
                                    </div>
                                </div>
                            </div>`;
                    });
                }
                this.dom.sidebarListContent.innerHTML = html;
            }

            selectChat(username) {
                this.activeChatUser = username;
                this.sessionUnreadCounters[username] = 0;
                this.dom.emptyChatPlaceholder.style.display = 'none';

                this.dom.activeChatTitle.innerText = `@${username}`;
                this.dom.activeChatAvatar.innerText = username.charAt(0).toUpperCase();
                this.dom.activeChatAvatar.style.backgroundColor = VisualGenerator.getHashColor(username);

                let history = this.db.getHistory();
                if (!history[username]) this.db.saveMessage(username, { type: 'sys', text: 'init', time: '' });

                this.dom.appWrapper.classList.add('chat-opened');
                this.renderMessagesView();
                this.renderSidebar(this.dom.globalSearchInput.value);
                
                setTimeout(() => this.dom.mainMessageInput.focus(), 100);
            }

            closeChatMobile() {
                this.dom.appWrapper.classList.remove('chat-opened');
                this.activeChatUser = null;
                this.renderSidebar(this.dom.globalSearchInput.value);
            }

            renderMessagesView() {
                if(!this.activeChatUser) return;
                const messages = this.db.getHistory()[this.activeChatUser] || [];
                let html = '';
                
                messages.forEach(msg => {
                    if (msg.type === 'sys') return;
                    const dir = (msg.type === 'out') ? 'outbound' : 'inbound';
                    html += `<div class="msg-bubble ${dir}">${msg.text}<span class="msg-timestamp">${msg.time}</span></div>`;
                });

                this.dom.messagesContainer.innerHTML = html;
                this.dom.messagesContainer.scrollTop = this.dom.messagesContainer.scrollHeight;
            }

            executeSendMessage() {
                const text = this.dom.mainMessageInput.value.trim();
                if(!text || !this.activeChatUser) return;

                const timeStr = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                
                // Отправляем пакет по-настоящему через интернет
                const sent = this.network.sendEncryptedPacket(this.activeChatUser, text, timeStr);
                
                if (sent) {
                    this.db.saveMessage(this.activeChatUser, { type: 'out', text: text, time: timeStr });
                    this.dom.mainMessageInput.value = '';
                    this.renderMessagesView();
                    this.renderSidebar(this.dom.globalSearchInput.value);
                } else {
                    alert("Нет подключения к серверу. Подождите пару секунд.");
                }
            }

            handleInboundMessage(packet) {
                this.db.saveMessage(packet.sender, { type: 'in', text: packet.text, time: packet.time });
                if (this.activeChatUser === packet.sender) {
                    this.renderMessagesView();
                } else {
                    this.sessionUnreadCounters[packet.sender] = (this.sessionUnreadCounters[packet.sender] || 0) + 1;
                }
                this.renderSidebar(this.dom.globalSearchInput.value);
            }
        }

        window.app = new ApplicationEngine();
    </script>
</body>
</html>
